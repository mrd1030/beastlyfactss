<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/webp" sizes="32x32" href="./src/assets/favicon.webp">
    <link rel="apple-touch-icon" href="./src/assets/favicon.webp">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Homepage fallback meta — for social bots (no JS) and Googlebot first-pass crawl.
         NO canonical here: react-helmet-async injects the correct one per-route.
         Two canonicals = Google ignores both. -->
    <title>Beastly Facts | Amazing Animal Trivia, Guides &amp; Fun Quizzes</title>
    <!-- Open Graph — site-wide only; per-page og:url/title/description/type/image injected
         by react-helmet-async. og:image (+width/height/alt) intentionally NOT duplicated here —
         every page now sets its own via Helmet, and a static leftover here would sit alongside
         Helmet's per-page override as a second, stale og:image tag (same failure mode already
         fixed for meta name="description"). Crawlers reading the first of two conflicting
         og:image tags would get this generic one instead of the per-post image. -->
    <meta property="og:site_name" content="Beastly Facts" />

    <!-- Twitter Card — twitter:card intentionally NOT duplicated here for the same
         reason as og:image above: every page now sets its own via Helmet (including
         Pack.jsx, which deliberately uses "summary" instead of "summary_large_image"),
         and a static leftover here would create a second, conflicting twitter:card tag. -->
    <meta name="twitter:site" content="@beastlyfacts" />

    <!-- LCP preload: hero image above fold, fetched before render -->
    <!-- Preload WebP hero (preferred by modern browsers); sizes match HeroSection srcset -->
    <link rel="preload" as="image" href="/assets/hero-1200.webp" type="image/webp"
      imagesrcset="/assets/hero-400.webp 400w, /assets/hero-800.webp 800w, /assets/hero-1200.webp 1200w, /assets/hero-1600.webp 1600w"
      imagesizes="(max-width: 640px) 100vw, (max-width: 1024px) 90vw, 1200px" />
    <!-- Fonts: preload then apply async to avoid render-blocking -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" media="print" onload="this.media='all'" />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <meta name="p:domain_verify" content="bb226bb96315ba08f0689d0569facbcb"/>
    <!-- Chewy affiliate program (Impact) site verification -->
    <meta name='impact-site-verification' value='a5d0acbb-072a-4fff-9585-0a3a2b7e9546'>

    new Date().getTime(),event:'gtm.js'});var f=d.getElementsByTagName(s)[0],

    'https://www.googletagmanager.com/gtm.js?id='+i+dl;f.parentNode.insertBefore(j,f);
    })(window,document,'script','dataLayer','GTM-N3PXSDZB');</script>
    <!-- End Google Tag Manager -->

</head>
